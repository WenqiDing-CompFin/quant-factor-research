name: CI

on:
  push:
  pull_request:

jobs:
  test-and-reproduce:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python run_research.py --output-dir reproduced-results
      - name: Verify required artifacts
        run: |
          test -s reproduced-results/metrics.csv
          test -s reproduced-results/factor_ic_summary.csv
          test -s reproduced-results/monthly_returns.csv
          test -s reproduced-results/equity_curve.png
          test -s reproduced-results/run_manifest.json
